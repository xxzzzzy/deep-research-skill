name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe expected and actual behavior without including private data.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the command, configuration, and minimal example.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
    validations:
      required: true
  - type: checkboxes
    id: secrets
    attributes:
      label: Safety check
      options:
        - label: I removed API keys, private prompts, and sensitive report content.
          required: true
